name: CI

on:
  pull_request:
    paths:
      - 'scripts/**'
      - 'examples/**'
      - 'requirements.txt'
      - '.github/workflows/ci.yml'

jobs:
  quick:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python3 -m py_compile scripts/*.py
      - run: python3 scripts/validate_research_pack.py examples/research-pack-example.md
      - name: Validate bad-sample rejection
        run: |
          fail() { echo "FAIL: $1"; exit 1; }
          tmp=$(mktemp -d)

          # Generate all test fixtures via Python for clean isolation
          python3 -c "
import re

VALID = '''## Objective
ok

## Decision context
ok

## Primary route
ok

## Secondary disciplines
ok

## Core subquestions
ok

## Stop condition
ok

## Source register
ok

## Claim register
ok

## Uncertainty register
ok

## Artifact contract
ok

## Required audits
ok

## Final audit status
ok
'''

import os, sys
d = sys.argv[1]

# 1. valid baseline
open(os.path.join(d, 'valid.md'), 'w').write(VALID)

# 2. heading only in fenced code block
text = re.sub(r'^## Stop condition\nok', '```\n## Stop condition\n```', VALID, flags=re.MULTILINE)
open(os.path.join(d, 'codeblock.md'), 'w').write(text)

# 3. empty section
text = re.sub(r'^## Stop condition\nok', '## Stop condition\n', VALID, flags=re.MULTILINE)
open(os.path.join(d, 'empty.md'), 'w').write(text)

# 4. H3 instead of H2
text = re.sub(r'^## Stop condition$', '### Stop condition', VALID, flags=re.MULTILINE)
open(os.path.join(d, 'h3.md'), 'w').write(text)

# 5. blockquote heading
text = re.sub(r'^## Stop condition$', '> ## Stop condition', VALID, flags=re.MULTILINE)
open(os.path.join(d, 'bq.md'), 'w').write(text)

# 6. indented fence (3-space indent)
text = re.sub(r'^## Stop condition\nok', '   ```\n   ## Stop condition\n   hidden\n   ```', VALID, flags=re.MULTILINE)
open(os.path.join(d, 'indented-fence.md'), 'w').write(text)

# 7. sub-heading-only body (no real content)
text = re.sub(r'^## Stop condition\nok', '## Stop condition\n### Placeholder subsection', VALID, flags=re.MULTILINE)
open(os.path.join(d, 'sub-only.md'), 'w').write(text)

# 8. partial heading match
text = re.sub(r'^## Stop condition$', '## Stop condition details', VALID, flags=re.MULTILINE)
open(os.path.join(d, 'partial.md'), 'w').write(text)
" "$tmp"

          # Run tests
          python3 scripts/validate_research_pack.py "$tmp/valid.md" || fail "valid baseline rejected"

          python3 scripts/validate_research_pack.py "$tmp/codeblock.md" && fail "code-block heading not rejected"
          python3 scripts/validate_research_pack.py "$tmp/empty.md" && fail "empty section not rejected"
          python3 scripts/validate_research_pack.py "$tmp/h3.md" && fail "H3 heading not rejected"
          python3 scripts/validate_research_pack.py "$tmp/bq.md" && fail "blockquote heading not rejected"
          python3 scripts/validate_research_pack.py "$tmp/indented-fence.md" && fail "indented-fence heading not rejected"
          python3 scripts/validate_research_pack.py "$tmp/sub-only.md" && fail "sub-heading-only body not rejected"
          python3 scripts/validate_research_pack.py "$tmp/partial.md" && fail "partial heading match not rejected"

          rm -rf "$tmp"
          echo "Validator regression checks OK"

  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r requirements.txt
      - run: python -m playwright install chromium --with-deps
      - run: |
          temp=$(mktemp -d)
          cat > "$temp/in.md" << 'INEOF'
          ---
          title: <script>x</script>
          date: 2024-01-01
          type: test
          ---

          # Body
          INEOF
          python3 scripts/markdown_to_html.py "$temp/in.md" "$temp/out.html"
          grep -q '&lt;script&gt;' "$temp/out.html" || { echo 'FAIL: metadata not escaped'; exit 1; }
          grep -q '<br>' "$temp/out.html" || { echo 'FAIL: <br> missing from multiline meta'; exit 1; }
          ! grep -q '&lt;br&gt;' "$temp/out.html" || { echo 'FAIL: <br> was escaped instead of literal'; exit 1; }
          echo 'HTML escaping regression check OK'
          rm -rf "$temp"
      - run: |
          temp=$(mktemp -d)
          cat > "$temp/in.md" << 'INEOF'
          # Test

          Safe text.

          <script>alert(1)</script>
          <iframe src="https://evil.com"></iframe>
          <img src="x" onerror="alert(1)">
          <a href="javascript:alert(1)">bad</a>
          INEOF
          python3 scripts/markdown_to_html.py "$temp/in.md" "$temp/out.html"
          ! grep -qi '<script\|<iframe\|onerror=' "$temp/out.html" || { echo 'FAIL: body HTML not sanitized (script/iframe/onerror)'; exit 1; }
          ! grep -qi 'javascript:' "$temp/out.html" || { echo 'FAIL: javascript: URL not sanitized'; exit 1; }
          ! grep -qi 'style=' "$temp/out.html" || { echo 'FAIL: inline style not removed'; exit 1; }
          ! grep -qi '<img' "$temp/out.html" || { echo 'FAIL: img tag not stripped'; exit 1; }
          grep -q 'Safe text' "$temp/out.html" || { echo 'FAIL: safe content lost'; exit 1; }
          echo 'HTML sanitization check OK'
          rm -rf "$temp"
      - run: |
          temp=$(mktemp -d)
          cat > "$temp/in.md" << 'INEOF'
          # CSS/Style

          <span style="background:url(javascript:alert(1))">css-url</span>
          <div style="position:fixed;top:0">fixed</div>
          <span style="color:red">safe style</span>
          INEOF
          python3 scripts/markdown_to_html.py "$temp/in.md" "$temp/out.html"
          ! grep -q 'style=' "$temp/out.html" || { echo 'FAIL: style attr not stripped'; exit 1; }
          grep -q 'css-url' "$temp/out.html" || { echo 'FAIL: text content lost when style stripped'; exit 1; }
          grep -q 'fixed' "$temp/out.html" || { echo 'FAIL: text content lost when style stripped'; exit 1; }
          grep -q 'safe style' "$temp/out.html" || { echo 'FAIL: text content lost when style stripped'; exit 1; }
          echo 'CSS style stripping check OK'
          rm -rf "$temp"
      - run: |
          temp=$(mktemp -d)
          cat > "$temp/in.md" << 'INEOF'
          # Img src

          <img src="https://evil.com/track.png" alt="tracker">
          <img src="local.png" alt="local">
          INEOF
          python3 scripts/markdown_to_html.py "$temp/in.md" "$temp/out.html"
          ! grep -qi '<img' "$temp/out.html" || { echo 'FAIL: img tag not stripped'; exit 1; }
          echo 'Img stripping check OK'
          rm -rf "$temp"
      - run: python3 scripts/test_remote_block.py
      - run: |
          input_dir="/tmp/smoke test path"
          mkdir -p "$input_dir"
          printf '# Smoke Test\n\nTest paragraph.\n' > "$input_dir/input.md"
          python3 scripts/md_to_pdf.py "$input_dir/input.md" "$input_dir/output.pdf" \
            --title "CI Smoke Test"
      - run: |
          python3 -c "import sys,pathlib; d=pathlib.Path('/tmp/smoke test path/output.pdf').read_bytes(); assert len(d)>0 and d[:4]==b'%PDF'; print('PDF OK: '+str(len(d))+' bytes')"
